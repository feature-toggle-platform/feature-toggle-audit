spring:
  application:
    name: feature-toggle-audit
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: feature-toggle-audit
  mongodb:
    uri: mongodb://localhost:27017/feature-toggle-audit?uuidRepresentation=standard

topics:
  feature-toggle-events: feature-toggle-events
  feature-toggle-configuration-events: feature-toggle-configuration-events


event-processing:
  mode: non-transactional

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([${spring.application.name:-app}]){green} %clr([%X{correlationId:--}]){yellow} %clr([%X{actor:--}]){cyan} %clr(%-5level) -> %msg%n"

server:
  port: 8084

spring:
  application:
    name: configly-audit
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: configly-audit
  mongodb:
    uri: mongodb://localhost:27017/configly-audit?uuidRepresentation=standard

topics:
  configly-toggle-events: configly-toggle-events
  configly-structure-events: configly-structure-events


event-processing:
  mode: non-transactional

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([${spring.application.name:-app}]){green} %clr([%X{correlationId:--}]){yellow} %clr([%X{actor:--}]){cyan} %clr(%-5level) -> %msg%n"

server:
  port: 8084
